services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      TZ: Europe/Warsaw
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - n8n_postgres_data:/var/lib/postgresql/data
    ports:
      - "0.0.0.0:5432:5432"
    networks:
      - custom_network

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: always
    environment:
      TZ: Europe/Warsaw
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "0.0.0.0:8081:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - custom_network

  n8n:
    image: n8nio/n8n:1.89.2
    restart: always
    ports:
      - "0.0.0.0:5678:5678"
    environment:
      - TZ=Europe/Warsaw
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678
      - N8N_SECURE_COOKIE=false
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - postgres
    networks:
      - custom_network

  telethon-listener:
    image: q910705/telegram-client:986a508c9cc2b2ee0dad4f9f688f64e18bc2b5e7
    restart: always
    ports:
      - "0.0.0.0:8080:8080"
      - "0.0.0.0:8765:8765"
    environment:
      - TZ=Europe/Warsaw
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_PHONE=${TELEGRAM_PHONE}
      - N8N_WEBHOOK_URL=http://n8n:5678/webhook/telegram
      - N8N_DEGEN_WEBHOOK_URL=http://n8n:5678/webhook/telegram-degen
      - TELEGRAM_SESSION_DIR=/data
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - IGNORED_SENDERS=PinkPunkTradingBot,Tom_Trader81,Scott Golden,Tonie Kapitał Chat,DevSellingBot Lounge
      - DEGEN_GEMS_CHANNEL_NAMES=polski_degen - GEMS,prywatny
      - CHAIN_TO_CHANNEL_MAPPING=SOL,PinkPunk Trading Bot,Buy 0.1 SOL,Base,PinkPunk Trading Bot,XXX,ETH,PinkPunk Trading Bot,XXX
    volumes:
      - telethon_session:/data
    depends_on:
      - n8n
      - postgres
    networks:
      - custom_network

  bybit-trade-zarabiara:
    image: q910705/bybit-trade:76a4bab82083a3adde559bd95c67ab0fee1b00ef
    restart: always
    ports:
      - "0.0.0.0:8888:8888"
    environment:
      - TZ=Europe/Warsaw
      - BYBIT_API_KEY=${BYBIT_API_KEY_TELEGRAM}
      - BYBIT_API_SECRET=${BYBIT_API_SECRET_TELEGRAM}
      - MIN_USDT_AMOUNT_FOR_TRADE=${MIN_USDT_AMOUNT_FOR_TRADE}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
      - TWILIO_RECIPIENT_PHONE=${TWILIO_RECIPIENT_PHONE}
      - TWILIO_NOTIFICATIONS_ENABLED=${TWILIO_NOTIFICATIONS_ENABLED}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    depends_on:
      - postgres
    networks:
      - custom_network

  bitcoin-notifier:
    image: q910705/bitcoin-notifier:76351462d0de4667eec08a65b39440cd91eb84d1
    container_name: bitcoin-notifier
    restart: always
    volumes:
      - ./logs:/logs
    environment:
      - TZ=Europe/Warsaw
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - COINS=BTC,ETH,SOL,XRP,BNB,DOGE,ADA,TRX,LINK,AVAX,XLM,HBAR,BCH,LTC,DOT,XMR,UNI
    networks:
      - custom_network

volumes:
  n8n_postgres_data:
  n8n_data:
  telethon_session:
  pgadmin_data:

networks:
  custom_network:
    driver: bridge
