services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      TZ: Europe/Warsaw
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - n8n_postgres_data:/var/lib/postgresql/data
    ports:
      - "0.0.0.0:5432:5432"
    networks:
      - custom_network

  n8n:
    image: n8nio/n8n:1.89.2
    restart: always
    ports:
      - "0.0.0.0:5678:5678"
    environment:
      - TZ=Europe/Warsaw
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678
      - N8N_SECURE_COOKIE=false
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - postgres
    networks:
      - custom_network

  telethon-listener:
    image: q910705/telegram-client:latest
    restart: always
    # Przechwytujemy wyjście do pliku w zamontowanym folderze
    entrypoint: /bin/sh
    command: -c "python3 main.py 2>&1 | tee -a /logs/telegram.log"
    ports:
      - "0.0.0.0:8080:8080"
      - "0.0.0.0:8765:8765"
    environment:
      - TZ=Europe/Warsaw
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_PHONE=${TELEGRAM_PHONE}
      - N8N_WEBHOOK_URL=http://n8n:5678/webhook/telegram
      - TELEGRAM_SESSION_DIR=/data
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - ALLOWED_SENDERS=[Trading PRO]Trader Rookie,[Trading PRO]Trader Walesz | AI Trading,[Trading PRO]Trader Albert,Zarabiara,[KDP Premium+]🟢 Zagrania naszych traderów - mniej ryzykowne
    volumes:
      - telethon_session:/data
      - ./logs/telegram:/logs
    depends_on:
      - n8n
      - postgres
    networks:
      - custom_network

  bybit-trade-zarabiara:
    image: q910705/bybit-trade:latest
    restart: always
    entrypoint: /bin/sh
    command: -c "./app 2>&1 | tee -a /logs/bybit.log"
    ports:
      - "0.0.0.0:8888:8888"
    environment:
      - TZ=Europe/Warsaw
      - BLOFIN_API_KEY=${BLOFIN_API_KEY}
      - BLOFIN_API_SECRET=${BLOFIN_API_SECRET}
      - BLOFIN_API_PASSPHRASE=${BLOFIN_API_PASSPHRASE}
      - USD_AMOUNT_FOR_TRADE=${USD_AMOUNT_FOR_TRADE}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
      - TWILIO_RECIPIENT_PHONE=${TWILIO_RECIPIENT_PHONE}
      - TWILIO_NOTIFICATIONS_ENABLED=${TWILIO_NOTIFICATIONS_ENABLED}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    depends_on:
      - postgres
    networks:
      - custom_network

volumes:
  n8n_postgres_data:
  n8n_data:
  telethon_session:
  pgadmin_data:

networks:
  custom_network:
    driver: bridge
